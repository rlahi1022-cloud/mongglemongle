name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 1) 단위 테스트 — 가벼운 의존성만 필요. permissions/ttl_cache/metrics 21 케이스.
  #    redis-plus-plus / minio-cpp / drogon / opencv 없이 빌드되도록 별도 CMakeLists 사용.
  unit-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install GoogleTest from apt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtest-dev cmake ninja-build

      - name: Configure tests
        run: cmake -S tests -B build-tests -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build tests
        run: cmake --build build-tests --parallel

      - name: Run ctest
        working-directory: build-tests
        run: ctest --output-on-failure

  # 2) 클라이언트 — TS 컴파일 + Vite 빌드.
  client-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Type-check + build
        working-directory: client
        run: npm run build

  # 3) AI Hub Python — import 검증.
  ai-hub-import:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lightweight deps for import check
        run: |
          # 실제 모델 다운로드는 CI에서 너무 무거워서 stub만 검증
          pip install --quiet fastapi uvicorn pydantic

      - name: Import smoke test
        run: |
          cd ai-hub
          MONGGLE_AI_STUB=1 python -c "import app; print('app import OK')"
