services:
  # MinIO — S3 호환 오브젝트 스토리지 (기획 14.4의 monggle-media 버킷 역할)
  # MVP 백엔드는 아직 로컬 FS를 쓰지만, MinIO는 띄워둬서 마이그레이션 시
  # MONGGLE_S3_ENDPOINT 환경변수만 바꾸면 즉시 사용 가능.
  minio:
    image: minio/minio:latest
    container_name: monggle-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: monggle_admin
      MINIO_ROOT_PASSWORD: monggle_dev_secret
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      # 호스트 9002로 매핑 — 다른 프로젝트가 9000을 점유해도 충돌 없음.
      # 컨테이너 내부는 9000 그대로라 minio 자체 설정은 변경 불필요.
      - "9002:9000"   # S3 API
      - "9003:9001"   # 웹 콘솔
    volumes:
      - monggle_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  # AI 허브 — Python FastAPI 임베딩 서버 (기획 5장).
  # MVP는 SHA-256 기반 64차원 stub 임베딩. 인터페이스는 BGE-m3 도입 시 그대로 유지.
  ai-hub:
    build: ./ai-hub
    container_name: monggle-ai-hub
    restart: unless-stopped
    environment:
      MONGGLE_EMBEDDING_MODEL: BAAI/bge-m3
    ports:
      - "9100:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 10

  mariadb:
    image: mariadb:11
    container_name: monggle-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root_dev
      MARIADB_DATABASE: monggle
      MARIADB_USER: monggle
      MARIADB_PASSWORD: monggle_dev
    ports:
      - "3306:3306"
    volumes:
      - monggle_mariadb_data:/var/lib/mysql
      - ./server/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: monggle-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - monggle_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Prometheus — 백엔드 /metrics 스크랩.
  # docker compose --profile observability up 으로 켤 때만 기동.
  prometheus:
    image: prom/prometheus:latest
    container_name: monggle-prometheus
    restart: unless-stopped
    profiles: [observability]
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux에서 호스트 백엔드 접근
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - monggle_prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: monggle-grafana
    restart: unless-stopped
    profiles: [observability]
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: monggle_dev
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - monggle_grafana_data:/var/lib/grafana

volumes:
  monggle_mariadb_data:
  monggle_redis_data:
  monggle_minio_data:
  monggle_prometheus_data:
  monggle_grafana_data:
